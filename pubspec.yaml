name: zyra_mobile
description: "Zyra Mobile — L2 ADAS shadow-mode system for Android phones."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Models / codegen
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Platform services
  permission_handler: ^11.3.1
  shared_preferences: ^2.3.3
  path_provider: ^2.1.4
  wakelock_plus: ^1.2.10

  # Camera / sensors
  camera: ^0.11.0+2
  geolocator: ^13.0.2
  sensors_plus: ^6.1.1
  just_audio: ^0.9.42

  # Native bridge
  ffi: ^2.1.3

  # UI
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  ffigen: ^14.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/models/yolov8s.ncnn.param
    - assets/models/yolov8s.ncnn.bin
    - assets/audio/fcw_warn.wav
    - assets/audio/fcw_alert.wav
    - assets/audio/ldw_alert.wav
